https://taper.badquar.to/16/options.html

Gender is a yardstick; something to measure up against, be judged by. 
By one measure you might do well, by another you might do poorly. 

In this false binary, you can only choose one or the other; 
boy or girl, woman or man. But as with the 1s and 0s of bits,
enough decisions in opposition can choreograph a new dimension
entirely, and what was once black and white can fade to grey. 
And there is always another choice to make.

<body>
	<header id=nav>
		<h1>
			<a href="prev.html">&lt;&lt;</a> &nbsp;

				For Good Measure</a> : Spring 2026 &nbsp;

	<style>
		body {
			background-color: black;
			color: white;
			overflow: scroll;
		}
	</style>


	<form id="radioForm">
		<fieldset id="first">
			<legend>Select an option:</legend>
			<label><input type="radio" name="option" value="boy"> boy</label><br>
			<label><input type="radio" name="option" value="girl"> girl</label>
		</fieldset>
	</form>

	<script>
		var lastfs = document.getElementById("first");
		const bodyEl = document.getElementsByTagName('body')[0];
		var fields = 1;
		const msg1 = "if a binary bit can flip, a hundred bits to build this space"
		const msg2 = "what expanse can be shaped by another choice, given the chance"

		function replace(str, m, heat) {
			let a = [...str]
			for (const [i, c] of a.entries()) {
				a[i] = (Math.random() < heat) ? m[i] : c;
			}
			return a.join("");

		}

		function destruct(str, heat) {
			let a = [...str]
			for (const [i, c] of a.entries()) {
				a[i] = (Math.random() < heat) ? " " : c;
			}
			return a.join("");
		}

		document.addEventListener("DOMContentLoaded", function () {
			const radioForm = document.getElementById("radioForm");

			radioForm.addEventListener("change", function (event) {
				const selOpt = event.target.value;

				if (selOpt) {
					const parent = event.target.parentElement;
					parent.style = "font-weight:bold; font-style:italic; background-color:yellow;color:black;";
					const fs = document.createElement("fieldset");
					const l = document.createElement("legend");
					l.textContent = "Thank you. Please select an option:";
					fs.appendChild(l);

					const opt1 = document.createElement("label");
					const opt2 = document.createElement("label");

					let newOpt1 = `${selOpt}-boy`;
					let newOpt2 = `${selOpt}-girl`;

					const heat = fields/50;

					if (fields > 7){
						newOpt1 = replace(newOpt1, msg1, heat);
						newOpt2 = replace(newOpt2, msg2, heat);
					}

					if (fields > 10) {
						l.textContent = destruct(l.textContent, heat);
					}

					opt1.innerHTML = `<input type="radio" name="option" value="${newOpt1}"> ${newOpt1}<br>`;
					opt2.innerHTML = `<input type="radio" name="option" value="${newOpt2}"> ${newOpt2}<br>`;

					fs.appendChild(opt1);
					fs.appendChild(opt2);

					radioForm.appendChild(fs);
					lastfs.disabled=true;
					window.scrollTo(0, document.body.scrollHeight);

					if (fields > 50) {
						fs.disabled = true;
					}
					
					lastfs = fs;
					fields++;
				}
			});
		});
	</script>
</body>
